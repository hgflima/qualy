name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag (default: latest)'
        required: false
        default: 'latest'

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, test and publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          # Node 24 ships with npm >= 11.5.1, required for Trusted Publisher
          # OIDC publishing. Node 22 ships with npm 10.x.
          node-version: '24'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

      - name: Verify package version matches release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_NAME" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match release tag ($TAG_NAME)"
            exit 1
          fi
          echo "Version $PKG_VERSION matches tag v$TAG_NAME"

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public --tag "${{ github.event.inputs.tag || 'latest' }}"
